<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – SkillHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="min-height:100vh;display:flex;flex-direction:column">

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">
      <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#1e4fc2"/><path d="M10 28L18 12L26 22L30 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="30" cy="16" r="3" fill="white"/></svg>
      Skill<span style="color:#ffd700">Hub</span>
    </a>
    <div class="navbar-actions">
      <a href="register.html" class="btn btn-primary">Create Account</a>
    </div>
  </div>
</nav>

<main style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:#f8f9fa">
  <div class="form-card">
    <h2>Welcome Back 👋</h2>
    <p>Sign in to your SkillHub account</p>

    <div id="error-msg" class="form-error" style="display:none;background:#fce8e6;padding:10px 14px;border-radius:8px;margin-bottom:16px"></div>

    <form id="login-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn" style="padding:13px">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:.9rem;color:#6c757d">
      Don't have an account? <a href="register.html" style="color:#1e4fc2;font-weight:600">Join SkillHub</a>
    </p>
  </div>
</main>

<script type="module">
import { login, isLoggedIn, getUser } from './js/auth.js';

// Redirect if already logged in
if (isLoggedIn()) {
  const u = getUser();
  window.location.href = u?.role === 'freelancer' ? 'freelancer-dashboard.html'
                       : u?.role === 'admin'       ? 'admin.html'
                                                    : 'client-dashboard.html';
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const err = document.getElementById('error-msg');
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  err.style.display = 'none';
  try {
    const user = await login(
      document.getElementById('email').value,
      document.getElementById('password').value,
    );
    window.location.href = user.role === 'freelancer' ? 'freelancer-dashboard.html'
                         : user.role === 'admin'       ? 'admin.html'
                                                        : 'client-dashboard.html';
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
