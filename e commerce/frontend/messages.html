<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages – SkillHub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">
      <svg viewBox="0 0 40 40" fill="none"><rect width="40" height="40" rx="10" fill="#1e4fc2"/><path d="M10 28L18 12L26 22L30 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><circle cx="30" cy="16" r="3" fill="white"/></svg>
      Skill<span style="color:#ffd700">Hub</span>
    </a>
    <div class="navbar-actions" id="nav-actions"></div>
  </div>
</nav>

<div class="chat-layout">
  <!-- Contacts sidebar -->
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">💬 Messages</div>
    <div id="contacts-list">
      <div class="loader-wrapper" style="padding:20px"><div class="loader"></div></div>
    </div>
  </div>

  <!-- Chat main -->
  <div class="chat-main" id="chat-main">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:#6c757d;font-size:.95rem">
      Select a conversation to start chatting
    </div>
  </div>
</div>

<script type="module">
import api from './js/api.js';
import { requireAuth, getUser, renderNavAuth, toast, avatarInitials } from './js/auth.js';

requireAuth();
renderNavAuth();

const API_IMG = 'http://localhost:8000';
const me = getUser();
let activeContact = null;
let pollInterval = null;

// Pre-select from URL ?to=userId
const toParam = new URLSearchParams(window.location.search).get('to');

async function loadInbox() {
  const el = document.getElementById('contacts-list');
  try {
    const inbox = await api.get('/messages/inbox');
    if (!inbox.length && !toParam) {
      el.innerHTML = '<div style="padding:16px;color:#6c757d;font-size:.88rem">No conversations yet</div>';
      return;
    }
    el.innerHTML = inbox.map(c => `
      <div class="chat-contact ${activeContact === c.user_id ? 'active' : ''}" data-uid="${c.user_id}" data-name="${c.user_name}">
        <div style="width:38px;height:38px;border-radius:50%;background:#1e4fc2;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0">${avatarInitials(c.user_name)}</div>
        <div class="chat-contact-info">
          <div class="chat-contact-name">${c.user_name}</div>
          <div class="chat-contact-last">${c.last_message}</div>
        </div>
        ${c.unread > 0 ? `<div class="chat-unread">${c.unread}</div>` : ''}
      </div>`).join('');

    document.querySelectorAll('.chat-contact').forEach(el => {
      el.addEventListener('click', () => openChat(Number(el.dataset.uid), el.dataset.name));
    });

    // Auto-open if ?to= param
    if (toParam && !activeContact) {
      const existing = inbox.find(c => c.user_id === Number(toParam));
      const name = existing?.user_name || `User #${toParam}`;
      openChat(Number(toParam), name);
    }
  } catch (e) { el.innerHTML = `<div style="padding:16px;color:#dc3545">${e.message}</div>`; }
}

function openChat(uid, name) {
  activeContact = uid;
  document.querySelectorAll('.chat-contact').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.uid) === uid);
  });
  clearInterval(pollInterval);

  const chatMain = document.getElementById('chat-main');
  chatMain.innerHTML = `
    <div class="chat-header">
      <div style="width:36px;height:36px;border-radius:50%;background:#1e4fc2;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem">${avatarInitials(name)}</div>
      <div style="font-weight:700">${name}</div>
      <div style="margin-left:auto"><span style="width:8px;height:8px;background:#28a745;border-radius:50%;display:inline-block"></span> Online</div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
      <input type="text" id="msg-input" placeholder="Type a message…">
      <button class="chat-send-btn" id="send-btn">➤</button>
    </div>
  `;

  document.getElementById('send-btn').addEventListener('click', sendMessage);
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  loadMessages(uid);
  pollInterval = setInterval(() => loadMessages(uid), 4000);
}

async function loadMessages(uid) {
  const el = document.getElementById('chat-messages');
  if (!el) return;
  try {
    const msgs = await api.get(`/messages/conversation/${uid}`);
    const wasAtBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 20;
    el.innerHTML = msgs.map(m => {
      const isSent = m.sender_id === me?.id;
      const time = new Date(m.created_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
      return `
        <div class="chat-bubble ${isSent ? 'sent' : 'received'}">
          <div>${m.content}</div>
          <div class="chat-bubble-time">${time}</div>
        </div>`;
    }).join('');
    if (wasAtBottom || msgs.length === 0) el.scrollTop = el.scrollHeight;
  } catch {}
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input?.value.trim();
  if (!text || !activeContact) return;
  input.value = '';
  try {
    await api.post('/messages', { receiver_id: activeContact, content: text });
    loadMessages(activeContact);
    loadInbox();
  } catch (e) { toast(e.message, 'error'); }
}

loadInbox();
</script>
</body>
</html>
